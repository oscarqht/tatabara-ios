<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-surface": "#fcf8f8",
                    "surface-container": "#1a1919",
                    "primary": "#f4ffc8",
                    "on-primary": "#536600",
                    "tertiary-fixed": "#fedf46",
                    "on-tertiary-fixed": "#483d00",
                    "tertiary-fixed-dim": "#efd138",
                    "on-error-container": "#ffd2c8",
                    "on-surface-variant": "#adaaaa",
                    "secondary-dim": "#00e5ee",
                    "secondary-container": "#00696e",
                    "outline": "#777575",
                    "secondary-fixed-dim": "#00e5ee",
                    "on-secondary-fixed-variant": "#006266",
                    "error": "#ff7351",
                    "on-tertiary-container": "#5d4f00",
                    "on-primary-fixed": "#3b4a00",
                    "tertiary-dim": "#efd138",
                    "surface-variant": "#262626",
                    "surface-tint": "#f4ffc8",
                    "primary-fixed": "#cffc00",
                    "secondary-fixed": "#00f4fe",
                    "on-surface": "#ffffff",
                    "error-dim": "#d53d18",
                    "on-secondary-fixed": "#004346",
                    "on-tertiary-fixed-variant": "#685900",
                    "background": "#0e0e0e",
                    "secondary": "#00f4fe",
                    "surface-dim": "#0e0e0e",
                    "on-error": "#450900",
                    "on-secondary": "#00575b",
                    "primary-dim": "#c2ed00",
                    "inverse-on-surface": "#565554",
                    "inverse-primary": "#536600",
                    "on-primary-container": "#4b5e00",
                    "tertiary": "#ffeeab",
                    "tertiary-container": "#fedf46",
                    "on-secondary-container": "#dffdff",
                    "surface-container-high": "#201f1f",
                    "surface-container-low": "#131313",
                    "primary-fixed-dim": "#c2ed00",
                    "outline-variant": "#494847",
                    "surface-container-highest": "#262626",
                    "surface-bright": "#2c2c2c",
                    "on-primary-fixed-variant": "#546800",
                    "primary-container": "#cffc00",
                    "surface": "#0e0e0e",
                    "on-tertiary": "#675800",
                    "on-background": "#ffffff",
                    "error-container": "#b92902"
            },
            "borderRadius": {
                    "DEFAULT": "1.5rem",
                    "lg": "2.25rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .glass-panel {
            background: rgba(38, 38, 38, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .vertical-stepper::-webkit-scrollbar {
            display: none;
        }
        .picker-mask {
            mask-image: linear-gradient(to bottom, transparent, black 40%, black 60%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 40%, black 60%, transparent);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary selection:text-on-primary">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0e0e0e]/80 backdrop-blur-xl border-b border-[#f4ffc8]/5 flex items-center justify-between px-6 h-16 w-full">
<button class="text-[#f4ffc8] active:scale-95 duration-200">
<span class="material-symbols-outlined">bolt</span>
</button>
<h1 class="font-['Space_Grotesk'] tracking-tighter uppercase text-2xl font-bold text-[#f4ffc8]">PULSE</h1>
<button class="text-[#f4ffc8] active:scale-95 duration-200">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<main class="pt-24 pb-32 px-4 max-w-2xl mx-auto min-h-screen">
<!-- Screen Title Section -->
<div class="mb-10 px-2 flex justify-between items-end">
<div>
<span class="text-secondary font-headline text-xs tracking-[0.3em] uppercase block mb-2">Protocol 01</span>
<h2 class="text-4xl font-headline font-bold text-on-surface uppercase tracking-tighter">NEW WORKOUT</h2>
</div>
<div class="text-right">
<span class="text-on-surface-variant font-label text-[10px] uppercase tracking-widest block">Est. Time</span>
<span class="text-primary font-headline font-medium text-xl">12:45</span>
</div>
</div>
<!-- Controls Horizontal Row -->
<div class="grid grid-cols-3 gap-3 mb-8">
<!-- Workout Time Picker -->
<div class="surface-container-low p-4 rounded-xl flex flex-col items-center justify-between min-h-[360px] border border-outline-variant/10">
<div class="text-center mb-4">
<span class="text-primary font-label text-[10px] font-bold uppercase tracking-wider block">Workout</span>
<span class="text-on-surface-variant text-[9px] uppercase tracking-widest block opacity-60">Sec</span>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-primary active:scale-90 transition-all">
<span class="material-symbols-outlined text-lg">remove</span>
</button>
<div class="relative flex-1 w-full overflow-hidden picker-mask my-4">
<div class="flex flex-col items-center gap-4 py-8 vertical-stepper">
<span class="text-on-surface-variant/20 text-xl font-headline">30</span>
<span class="text-on-surface-variant/40 text-2xl font-headline">35</span>
<span class="text-primary text-5xl font-headline font-bold">40</span>
<span class="text-on-surface-variant/40 text-2xl font-headline">45</span>
<span class="text-on-surface-variant/20 text-xl font-headline">50</span>
</div>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-primary active:scale-90 transition-all">
<span class="material-symbols-outlined text-lg">add</span>
</button>
</div>
<!-- Rest Interval Picker -->
<div class="surface-container-low p-4 rounded-xl flex flex-col items-center justify-between min-h-[360px] border border-outline-variant/10">
<div class="text-center mb-4">
<span class="text-secondary font-label text-[10px] font-bold uppercase tracking-wider block">Rest</span>
<span class="text-on-surface-variant text-[9px] uppercase tracking-widest block opacity-60">Sec</span>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-secondary active:scale-90 transition-all">
<span class="material-symbols-outlined text-lg">remove</span>
</button>
<div class="relative flex-1 w-full overflow-hidden picker-mask my-4">
<div class="flex flex-col items-center gap-4 py-8 vertical-stepper">
<span class="text-on-surface-variant/20 text-xl font-headline">05</span>
<span class="text-on-surface-variant/40 text-2xl font-headline">10</span>
<span class="text-secondary text-5xl font-headline font-bold">15</span>
<span class="text-on-surface-variant/40 text-2xl font-headline">20</span>
<span class="text-on-surface-variant/20 text-xl font-headline">25</span>
</div>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-secondary active:scale-90 transition-all">
<span class="material-symbols-outlined text-lg">add</span>
</button>
</div>
<!-- Total Cycles Picker -->
<div class="surface-container-low p-4 rounded-xl flex flex-col items-center justify-between min-h-[360px] border border-outline-variant/10">
<div class="text-center mb-4">
<span class="text-tertiary font-label text-[10px] font-bold uppercase tracking-wider block">Cycles</span>
<span class="text-on-surface-variant text-[9px] uppercase tracking-widest block opacity-60">Sets</span>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-tertiary active:scale-90 transition-all">
<span class="material-symbols-outlined text-lg">remove</span>
</button>
<div class="relative flex-1 w-full overflow-hidden picker-mask my-4">
<div class="flex flex-col items-center gap-4 py-8 vertical-stepper">
<span class="text-on-surface-variant/20 text-xl font-headline">04</span>
<span class="text-on-surface-variant/40 text-2xl font-headline">06</span>
<span class="text-tertiary text-5xl font-headline font-bold">08</span>
<span class="text-on-surface-variant/40 text-2xl font-headline">10</span>
<span class="text-on-surface-variant/20 text-xl font-headline">12</span>
</div>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-tertiary active:scale-90 transition-all">
<span class="material-symbols-outlined text-lg">add</span>
</button>
</div>
</div>
<!-- Summary & Action Area -->
<div class="space-y-6">
<div class="glass-panel p-8 rounded-xl border border-outline-variant/10">
<div class="flex items-center gap-4">
<div class="w-14 h-14 rounded-2xl bg-secondary-container/30 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined">analytics</span>
</div>
<div>
<h4 class="font-headline font-bold text-on-surface uppercase tracking-tight">Intensity Profile</h4>
<p class="text-on-surface-variant text-xs font-body">High-intensity interval training (HIIT)</p>
</div>
</div>
<div class="mt-8 flex gap-2 items-end h-10">
<div class="flex-1 bg-primary h-[40%] rounded-t-lg"></div>
<div class="flex-1 bg-secondary h-[20%] rounded-t-lg"></div>
<div class="flex-1 bg-primary h-[70%] rounded-t-lg"></div>
<div class="flex-1 bg-secondary h-[20%] rounded-t-lg"></div>
<div class="flex-1 bg-primary h-[90%] rounded-t-lg"></div>
<div class="flex-1 bg-secondary h-[20%] rounded-t-lg"></div>
<div class="flex-1 bg-primary h-[100%] rounded-t-lg"></div>
<div class="flex-1 bg-secondary h-[20%] rounded-t-lg"></div>
</div>
</div>
<button class="w-full h-20 rounded-xl bg-primary text-on-primary-fixed font-headline font-extrabold text-xl uppercase tracking-widest active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                Initialize Workout
                <span class="material-symbols-outlined">play_arrow</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-[#0e0e0e]/90 backdrop-blur-2xl border-t border-[#f4ffc8]/5 flex justify-around items-center h-24 px-8 pb-4">
<a class="flex flex-col items-center justify-center text-[#f4ffc8]" href="#">
<span class="material-symbols-outlined">timer</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold tracking-widest uppercase mt-1">Workout</span>
</a>
<a class="flex flex-col items-center justify-center text-white/30 hover:text-[#00f4fe] transition-all" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold tracking-widest uppercase mt-1">History</span>
</a>
<a class="flex flex-col items-center justify-center text-white/30 hover:text-[#00f4fe] transition-all" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold tracking-widest uppercase mt-1">Profile</span>
</a>
</nav>
</body></html>
