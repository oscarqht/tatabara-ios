<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-surface": "#fcf8f8",
                    "surface-container": "#1a1919",
                    "primary": "#f4ffc8",
                    "surface-container-lowest": "#000000",
                    "on-primary": "#536600",
                    "tertiary-fixed": "#fedf46",
                    "on-tertiary-fixed": "#483d00",
                    "tertiary-fixed-dim": "#efd138",
                    "on-error-container": "#ffd2c8",
                    "on-surface-variant": "#adaaaa",
                    "secondary-dim": "#00e5ee",
                    "secondary-container": "#00696e",
                    "outline": "#777575",
                    "secondary-fixed-dim": "#00e5ee",
                    "on-secondary-fixed-variant": "#006266",
                    "error": "#ff7351",
                    "on-tertiary-container": "#5d4f00",
                    "on-primary-fixed": "#3b4a00",
                    "tertiary-dim": "#efd138",
                    "surface-variant": "#262626",
                    "surface-tint": "#f4ffc8",
                    "primary-fixed": "#cffc00",
                    "secondary-fixed": "#00f4fe",
                    "on-surface": "#ffffff",
                    "error-dim": "#d53d18",
                    "on-secondary-fixed": "#004346",
                    "on-tertiary-fixed-variant": "#685900",
                    "background": "#0e0e0e",
                    "secondary": "#00f4fe",
                    "surface-dim": "#0e0e0e",
                    "on-error": "#450900",
                    "on-secondary": "#00575b",
                    "primary-dim": "#c2ed00",
                    "inverse-on-surface": "#565554",
                    "inverse-primary": "#536600",
                    "on-primary-container": "#4b5e00",
                    "tertiary": "#ffeeab",
                    "tertiary-container": "#fedf46",
                    "on-secondary-container": "#dffdff",
                    "surface-container-high": "#201f1f",
                    "surface-container-low": "#131313",
                    "primary-fixed-dim": "#c2ed00",
                    "outline-variant": "#494847",
                    "surface-container-highest": "#262626",
                    "surface-bright": "#2c2c2c",
                    "on-primary-fixed-variant": "#546800",
                    "primary-container": "#cffc00",
                    "surface": "#0e0e0e",
                    "on-tertiary": "#675800",
                    "on-background": "#ffffff",
                    "error-container": "#b92902"
            },
            "borderRadius": {
                    "DEFAULT": "0.75rem",
                    "lg": "1.25rem",
                    "xl": "2rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
    .flat-ring {
      stroke-linecap: round;
    }
  </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary selection:text-on-primary min-h-screen overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0e0e0e] border-b border-[#f4ffc8]/10 flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#f4ffc8]" data-icon="bolt">bolt</span>
<h1 class="text-2xl font-bold text-[#f4ffc8] font-['Space_Grotesk'] tracking-tighter uppercase">PULSE</h1>
</div>
<button class="text-[#f4ffc8] active:scale-95 duration-200 hover:text-[#00f4fe] transition-colors">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<main class="relative h-screen w-full flex flex-col items-center justify-center px-6 pt-16 pb-24">
<!-- Cycle Indicator -->
<div class="mb-12 flex flex-col items-center text-center">
<span class="text-[11px] font-bold tracking-[0.3em] text-on-surface-variant uppercase mb-2">Current Session</span>
<div class="flex items-end gap-1">
<span class="font-headline text-4xl font-bold text-primary leading-none">Cycle 2</span>
<span class="font-headline text-xl font-light text-on-surface-variant mb-1">/ 8</span>
</div>
</div>
<!-- Hero Component: Flat Timer Ring -->
<div class="relative w-80 h-80 md:w-96 md:h-96 flex items-center justify-center">
<!-- Progress Ring Background -->
<div class="absolute inset-0 rounded-full border-4 border-surface-container-highest"></div>
<!-- Progress Ring Foreground (Flat) -->
<svg class="absolute inset-0 w-full h-full -rotate-90 transform" viewbox="0 0 100 100">
<circle class="text-primary/10" cx="50" cy="50" fill="transparent" r="48" stroke="currentColor" stroke-width="2.5"></circle>
<circle class="text-primary flat-ring" cx="50" cy="50" fill="transparent" r="48" stroke="currentColor" stroke-dasharray="301.59" stroke-dashoffset="75.4" stroke-width="3"></circle>
</svg>
<!-- Centered Data Cluster -->
<div class="z-10 flex flex-col items-center justify-center text-center">
<div class="mb-[-0.5rem]">
<span class="text-[10px] font-bold tracking-[0.4em] text-secondary uppercase">Workout</span>
</div>
<div class="font-headline text-8xl md:text-9xl font-bold tracking-tighter text-primary">
                    00:20
                </div>
<div class="flex items-center gap-2 mt-2">
<span class="material-symbols-outlined text-[14px]" data-icon="monitor_heart">monitor_heart</span>
<span class="font-headline text-sm font-medium tracking-widest uppercase text-on-surface-variant">144 BPM</span>
</div>
</div>
</div>
<!-- Next Up Info (High Corner Radius) -->
<div class="mt-16 w-full max-w-xs bg-surface-container-low rounded-xl p-6 flex items-center justify-between border border-primary/10">
<div>
<span class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1">Next Up</span>
<span class="font-headline text-lg font-bold text-on-surface uppercase">Rest</span>
</div>
<div class="text-right">
<span class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1">Duration</span>
<span class="font-headline text-lg font-bold text-secondary uppercase">00:10</span>
</div>
</div>
<!-- Bottom Action Bar (Contextual Controls - Flat & Rounded) -->
<div class="mt-auto mb-12 flex items-center gap-8">
<button class="w-14 h-14 rounded-xl border-2 border-secondary/20 flex items-center justify-center text-secondary active:scale-90 transition-all bg-surface-container-low">
<span class="material-symbols-outlined text-3xl" data-icon="replay">replay</span>
</button>
<button class="w-20 h-20 rounded-xl bg-primary flex items-center justify-center text-on-primary active:scale-90 transition-all">
<span class="material-symbols-outlined text-5xl" data-icon="pause" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="w-14 h-14 rounded-xl border-2 border-error/20 flex items-center justify-center text-error active:scale-90 transition-all bg-surface-container-low">
<span class="material-symbols-outlined text-3xl" data-icon="stop" style="font-variation-settings: 'FILL' 1;">stop</span>
</button>
</div>
</main>
<!-- BottomNavBar (Flat Background) -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-[#0e0e0e] border-t border-[#f4ffc8]/10 flex justify-around items-center h-20 px-8 pb-4">
<a class="flex flex-col items-center justify-center text-[#f4ffc8] active:scale-90 duration-300 hover:text-[#00f4fe] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="timer" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold tracking-widest uppercase">Workout</span>
</a>
<a class="flex flex-col items-center justify-center text-white/30 active:scale-90 duration-300 hover:text-[#00f4fe] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold tracking-widest uppercase">History</span>
</a>
<a class="flex flex-col items-center justify-center text-white/30 active:scale-90 duration-300 hover:text-[#00f4fe] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold tracking-widest uppercase">Profile</span>
</a>
</nav>
</body></html>
